<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>PoE Multi-Base Unique Cheatsheet</title>
<style>
:root{--is:42px;--pf:9px;--nf:10px;--bf:9px;--gap:3px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#0d1117;color:#e6e6e6;font-family:'Segoe UI',Arial,sans-serif;padding:4px 4px 0;display:flex;flex-direction:column;gap:3px}
/* ── card area ── */
#output{flex:1;overflow:hidden;min-height:0}
.bases-wrap{display:flex;flex-wrap:wrap;gap:var(--gap);align-content:flex-start;align-items:flex-start}
.base-card{display:flex;align-items:stretch;background:#181e25;border:1px solid #2d333b;border-radius:4px;overflow:hidden}
.base-card:hover{border-color:#444c56;background:#1c2330}
.base-label{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:2px;padding:3px 5px;border-right:1px solid #2d333b;min-width:0}
.base-name{font-size:var(--nf);font-weight:700;color:#c8a96e;white-space:nowrap;line-height:1.1}
.base-max{font-size:var(--bf);font-weight:700;padding:1px 4px;border-radius:5px;white-space:nowrap;line-height:1.3;align-self:flex-start}
.icons-row{display:flex;flex-wrap:nowrap;gap:1px;align-items:center;padding:3px}
.icon-item{display:flex;flex-direction:column;align-items:center;gap:1px;border-radius:3px;padding:2px;border:1px solid transparent;flex-shrink:0}
.icon-item:hover{background:rgba(255,255,255,0.07);border-color:#3d444d}
.icon-item img{width:var(--is);height:var(--is);object-fit:contain;display:block}
.icon-placeholder{width:var(--is);height:var(--is);display:block}
.icon-price{font-size:var(--pf);font-weight:700;line-height:1;text-align:center;white-space:nowrap}
/* tier — badge */
.t-s.base-max{background:#9a0e0e;color:#fff}
.t-a.base-max{background:#b06000;color:#fff}
.t-b.base-max{background:#846500;color:#fff}
.t-c.base-max{background:#1a5a1a;color:#fff}
.t-d.base-max{background:#1a3452;color:#aac}
.t-x.base-max{background:#1e1e1e;color:#555}
.t-boss.base-max{background:#004450;color:#7ee}
.t-special.base-max{background:#3d0058;color:#d8a}
/* tier — price label */
.t-s .icon-price{color:#ff6060}
.t-a .icon-price{color:#ffa040}
.t-b .icon-price{color:#e0c800}
.t-c .icon-price{color:#44c044}
.t-d .icon-price{color:#4878b8}
.t-x .icon-price{color:#444}
.t-boss .icon-price{color:#00b0c4}
.t-special .icon-price{color:#a050d8}
/* ── footer bar ── */
#bar{display:flex;align-items:center;flex-wrap:wrap;gap:3px 6px;padding:3px 4px;border-top:1px solid #1c2128;flex-shrink:0;font-size:10px;color:#555;line-height:1}
#bar a{color:#3a5070;text-decoration:none}
#bar a:hover{color:#6496c8}
.bsep{color:#2a2a2a;padding:0 1px}
.btitle{color:#6a7a5a;font-weight:600;letter-spacing:.2px}
.litem{display:inline-flex;align-items:center;gap:2px;color:#555}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#bar label{color:#6a6a6a}
#bar select,#bar input[type=number]{background:#161b22;color:#bbb;border:1px solid #2a3040;border-radius:3px;padding:1px 4px;font-size:10px;cursor:pointer;vertical-align:middle}
#bar input[type=number]{width:34px;text-align:center}
#bar select:focus,#bar input[type=number]:focus{outline:1px solid #c8a96e}
#modeBtn{background:#182818;color:#aaa;border:1px solid #253525;border-radius:3px;padding:1px 6px;font-size:10px;cursor:pointer;vertical-align:middle;white-space:nowrap}
#modeBtn:hover{background:#1e3a1e;color:#fff}
#modeBtn.under{background:#2a1818;color:#ff8060;border-color:#4a2520}
#status{color:#555;font-style:italic}
#status.loading{color:#c8a96e;font-style:normal}
#status.error{color:#f85149;font-style:normal}
/* icon links */
a.icon-item{text-decoration:none;color:inherit}
/* ── phone mode: vertical scroll, full-width cards ── */
html.phone,body.phone{overflow-y:auto;height:auto}
body.phone #output{flex:none;overflow:visible;height:auto}
body.phone .bases-wrap{flex-direction:column;gap:3px}
body.phone .base-card{width:100%}
body.phone .base-label{width:130px;min-width:130px;max-width:130px;flex-shrink:0;overflow:hidden}
body.phone .base-name{overflow:hidden;text-overflow:ellipsis;max-width:100%}
body.phone .icons-row{flex-wrap:wrap}
</style>
</head>
<body>
<div id="output"></div>
<div id="bar">
  <span class="btitle">&#x2697;&#xFE0F; PoE Multibase</span>
  <span class="bsep">·</span>
  <span class="litem"><span class="ldot" style="background:#c03030"></span>1k+</span>
  <span class="litem"><span class="ldot" style="background:#c07000"></span>100c</span>
  <span class="litem"><span class="ldot" style="background:#b09000"></span>20c</span>
  <span class="litem"><span class="ldot" style="background:#308030"></span>5c</span>
  <span class="litem"><span class="ldot" style="background:#3060a0"></span>2c</span>
  <span class="litem"><span class="ldot" style="background:#008090"></span>boss</span>
  <span class="litem"><span class="ldot" style="background:#7000a0"></span>spec</span>
  <span class="bsep">·</span>
  <label>League</label>
  <select id="leagueSelect" onchange="reloadLeague()">
    <option value="Mirage">Mirage</option>
    <option value="Mercenaries">Mercenaries</option>
    <option value="Standard">Standard</option>
    <option value="Hardcore Mercenaries">HC Merc</option>
  </select>
  <label>Min</label>
  <input type="number" id="minPrice" value="5" min="0" step="1" oninput="saveMin();render()"><span style="color:#555">c</span>
  <button id="modeBtn" onclick="toggleMode()" title="Toggle above/below threshold"></button>
  <span class="bsep">·</span>
  <a href="https://poe.ninja" target="_blank">poe.ninja</a>
  <span class="bsep">·</span>
  <a href="https://github.com/sheldonels/poe-multibase-cheatsheet" target="_blank">GitHub</a>
  <span class="bsep">·</span>
  <span id="status" class="loading">Loading...</span>
</div>
<script>
const ALL_BASES=["Amethyst Flask","Antique Gauntlets","Assassin's Boots","Crude Bow","Crusader Plate","Ebony Tower Shield","Fiend Dagger","Foul Staff","Gold Ring","Heavy Belt","Hellion's Paw","Highborn Staff","Hydrascale Gauntlets","Imperial Bow","Imperial Skean","Imperial Staff","Lapis Amulet","Leather Belt","Magistrate Crown","Moonstone Ring","Onyx Amulet","Paua Amulet","Prophet Crown","Sage's Robe","Saint's Hauberk","Small Cluster Jewel","Spidersilk Robe","Spine Bow","Steel Ring","Stealth Boots","Studded Belt","Turquoise Amulet","Vaal Blade","Vaal Claw","Waxed Garb"];
const BOSS_ONLY=new Set(["Progenesis","Admiral's Arrogance","The Stampede","The Winds of Fate","Mageblood","Law of the Wilds","Wing of the Wyvern","Woespike","Mask of the Stitched Demon","Zerphi's Heart","The Siege","Breathstealer","Sporeguard","Crown of the Tyrant","Mask of the Tribunal","Ashes of the Stars","Stranglegasp","Yoke of Suffering","Crown of the Inward Eye","Hyperboreus","Screams of the Desiccated","Cyclopean Coil","Farrul's Pounce","Witchhunter's Judgment","Mask of the Spirit Drinker","Sacrificial Heart","The Front Line","Betrayal's Sting","Mark of the Elder","Fenumus' Spinnerets","Bloodseeker","Khatal's Weeping","Choir of the Storm","Aul's Uprising","The Eternal Struggle","Crystallised Omniscience","Solstice Vigil","Presence of Chayula","Haunting Memories","The Broken Elegy","Ynda's Stand","Bear's Girdle"]);
const CRAFTED=new Set(["Khatal's Geyser","Mask of the Stitched Demon","Zerphi's Heart","Ynda's Stand","The Winds of Fate"]);
function tier(p){if(p>=1000)return"t-s";if(p>=100)return"t-a";if(p>=20)return"t-b";if(p>=5)return"t-c";if(p>=2)return"t-d";return"t-x"}
function fmt(p){if(p>=1000)return(p/1000).toFixed(1)+"k";if(p>=10)return Math.round(p)+"c";return p.toFixed(1)+"c"}
function itemTier(n,p){if(CRAFTED.has(n))return"t-special";if(BOSS_ONLY.has(n))return"t-boss";return tier(p)}
let cachedData={};
// ── settings persistence ──
function saveMin(){try{localStorage.setItem('minPrice',document.getElementById('minPrice').value);}catch(e){}}
let showUnder=false;
function toggleMode(){showUnder=!showUnder;applyModeBtn();try{localStorage.setItem('showUnder',showUnder);}catch(e){}render();}
function applyModeBtn(){const b=document.getElementById('modeBtn');b.textContent=showUnder?'< min':'\u2265 min';b.classList.toggle('under',showUnder);}
(function(){
  try{const v=localStorage.getItem('minPrice');if(v!==null)document.getElementById('minPrice').value=v;}catch(e){}
  try{showUnder=localStorage.getItem('showUnder')==='true';}catch(e){}
  applyModeBtn();
})();

function applySize(s){
  const r=document.documentElement.style;
  r.setProperty('--is',s+'px');
  r.setProperty('--pf',Math.max(7,Math.round(s*.215))+'px');
  r.setProperty('--nf',Math.max(8,Math.round(s*.245))+'px');
  r.setProperty('--bf',Math.max(7,Math.round(s*.2))+'px');
  r.setProperty('--gap',Math.max(2,Math.round(s*.065))+'px');
}

const PHONE_THRESHOLD=36;// px — below this, switch to scroll mode
function setPhone(on){
  document.documentElement.classList.toggle('phone',on);
  document.body.classList.toggle('phone',on);
}
function fitToViewport(){
  const out=document.getElementById('output');
  if(!out.firstChild)return;
  // Reset to desktop mode so clientHeight is accurate
  setPhone(false);
  out.style.overflow='hidden';
  let lo=PHONE_THRESHOLD,hi=60,best=lo-1;
  while(lo<=hi){
    const mid=(lo+hi)>>1;
    applySize(mid);
    if(out.scrollHeight<=out.clientHeight+1){best=mid;lo=mid+1;}
    else hi=mid-1;
  }
  if(best>=PHONE_THRESHOLD){
    applySize(best);// fits — desktop mode
  }else{
    // Switch to phone scroll mode with readable icon size
    out.style.overflow='';
    setPhone(true);
    applySize(44);
  }
}

function render(){
  const minPrice=Math.max(0,Number(document.getElementById("minPrice").value)||0);
  const league=document.getElementById("leagueSelect").value;
  const leagueSlug=league.toLowerCase().replace(/ /g,'-');
  const byBase=cachedData[league]||{};
  const cards=[];
  for(const baseName of ALL_BASES){
    const items=(byBase[baseName]||[]).filter(i=>showUnder?i.chaosValue<minPrice:i.chaosValue>=minPrice);
    if(!items.length)continue;
    const maxT=itemTier(items[0].name,items[0].chaosValue);
    let c='<div class="base-card"><div class="base-label"><span class="base-name">'+baseName+'</span><span class="base-max '+maxT+'">'+fmt(items[0].chaosValue)+'</span></div><div class="icons-row">';
    for(const item of items){
      const t=itemTier(item.name,item.chaosValue);
      const url='https://poe.ninja/economy/'+leagueSlug+'/'+(item.cat||'unique-accessories')+'?name='+encodeURIComponent(item.name);
      c+='<a class="icon-item '+t+'" href="'+url+'" target="_blank" rel="noopener" title="'+item.name+' \xb7 '+fmt(item.chaosValue)+'">';
      c+=item.icon?'<img src="'+item.icon+'" alt="'+item.name+'" loading="lazy" onerror="this.style.display=\'none\'">':'<span class="icon-placeholder"></span>';
      c+='<span class="icon-price">'+fmt(item.chaosValue)+'</span></a>';
    }
    c+='</div></div>';
    cards.push(c);
  }
  document.getElementById("output").innerHTML=cards.length
    ?'<div class="bases-wrap">'+cards.join('')+'</div>'
    :'<p style="text-align:center;color:#555;padding:16px;font-size:11px">No bases above '+minPrice+'c</p>';
  fitToViewport();
}

function buildIndex(items){
  const m={};
  for(const item of items){const b=item.baseType;if(!m[b])m[b]={};if(!m[b][item.name]||item.chaosValue>m[b][item.name].chaosValue)m[b][item.name]=item}
  for(const b of Object.keys(m))m[b]=Object.values(m[b]).sort((a,z)=>z.chaosValue-a.chaosValue);
  return m;
}

function reloadLeague(){
  const league=document.getElementById("leagueSelect").value;
  if(cachedData[league])render();
  else loadAll();
}

async function loadAll(){
  const status=document.getElementById("status");
  status.className="loading";
  status.textContent="Loading...";
  try{
    const r=await fetch("data.json?_="+Date.now());
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    cachedData={};
    for(const [league,items] of Object.entries(d.leagues||{}))cachedData[league]=buildIndex(items);
    status.className="";
    status.textContent="updated "+new Date(d.updatedAt).toLocaleTimeString();
    render();
  }catch(e){status.className="error";status.textContent=e.message;}
}

let _raf, _lastW=0;
window.addEventListener('resize',()=>{
  if(window.innerWidth===_lastW)return;// height-only (mobile address bar) — ignore
  _lastW=window.innerWidth;
  cancelAnimationFrame(_raf);
  _raf=requestAnimationFrame(fitToViewport);
});
loadAll();
</script>
</body>
</html>
