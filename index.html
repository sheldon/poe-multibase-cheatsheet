<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoE Multi-Base Unique Cheatsheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6e6e6;font-family:'Segoe UI',Arial,sans-serif;padding:16px;min-width:320px}
h1{text-align:center;color:#c8a96e;font-size:22px;margin-bottom:4px;text-shadow:0 0 20px rgba(200,169,110,0.4)}
.subtitle{text-align:center;color:#888;font-size:12px;margin-bottom:12px}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.controls label{color:#aaa;font-size:13px}
select{background:#21262d;color:#e6e6e6;border:1px solid #30363d;border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer}
select:focus{outline:2px solid #c8a96e}
button{background:#238636;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600;transition:background 0.2s}
button:hover{background:#2ea043}
button:disabled{background:#444;cursor:not-allowed}
.status{text-align:center;color:#888;font-size:12px;margin-bottom:12px;min-height:16px}
.status.loading{color:#c8a96e}
.status.error{color:#f85149}
.legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#aaa}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.section{margin-bottom:20px}
.section-header{padding:9px 14px;border-radius:6px 6px 0 0}
.section-header h2{font-size:15px;font-weight:700;color:#fff;letter-spacing:0.5px}
.section-header p{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}
.bases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:7px;background:#161b22;padding:8px;border-radius:0 0 6px 6px;border:1px solid #30363d;border-top:none}
.base-card{background:#1c2128;border:1px solid #30363d;border-radius:6px;overflow:hidden}
.base-header{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#21262d;border-bottom:1px solid #30363d}
.base-name{font-size:12px;font-weight:600;color:#c8a96e;flex:1;line-height:1.3}
.base-max{font-size:11px;font-weight:700;padding:2px 6px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.items-list{padding:5px;display:flex;flex-direction:column;gap:2px}
.item-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:4px;border-left:3px solid transparent}
.item-img{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.item-name{flex:1;font-size:11px;color:#c8a96e;line-height:1.2}
.item-price{font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.no-data{color:#555;font-size:11px;padding:4px 5px;font-style:italic}
.t-s{background:rgba(255,50,50,.15);border-left-color:#ff3232}.t-s .item-name{color:#ffaaaa}.t-s .item-price{color:#ff6666}.t-s.base-max{background:#ff3232;color:#fff}
.t-a{background:rgba(255,140,0,.15);border-left-color:#ff8c00}.t-a .item-name{color:#ffbf66}.t-a .item-price{color:#ff8c00}.t-a.base-max{background:#ff8c00;color:#fff}
.t-b{background:rgba(255,215,0,.1);border-left-color:#ffd700}.t-b .item-name{color:#ffe566}.t-b .item-price{color:#ffd700}.t-b.base-max{background:#c89f00;color:#fff}
.t-c{background:rgba(80,200,80,.1);border-left-color:#50c850}.t-c .item-name{color:#90d890}.t-c .item-price{color:#50c850}.t-c.base-max{background:#2a7a2a;color:#fff}
.t-d{background:rgba(100,150,210,.08);border-left-color:#6496c8}.t-d .item-name{color:#8aaed0}.t-d .item-price{color:#6496c8}.t-d.base-max{background:#2a4a6a;color:#fff}
.t-x{background:rgba(70,70,70,.1);border-left-color:#444}.t-x .item-name{color:#666}.t-x .item-price{color:#555}.t-x.base-max{background:#333;color:#888}
.t-boss{background:rgba(0,200,220,.1);border-left-color:#00c8dc}.t-boss .item-name{color:#66d9e8}.t-boss .item-price{color:#00c8dc}.t-boss.base-max{background:#005a64;color:#fff}
.t-special{background:rgba(180,0,255,.1);border-left-color:#b400ff}.t-special .item-name{color:#d966ff}.t-special .item-price{color:#b400ff}.t-special.base-max{background:#5a0080;color:#fff}
.footer{text-align:center;color:#555;font-size:11px;margin-top:20px;padding-top:12px;border-top:1px solid #21262d}
.footer a{color:#6496c8;text-decoration:none}
</style>
</head>
<body>
<h1>&#x2697;&#xFE0F; PoE Multi-Base Unique Cheatsheet</h1>
<p class="subtitle">Prices live from poe.ninja &middot; Always ID these bases!</p>
<div class="controls">
  <label>League:</label>
  <select id="leagueSelect">
    <option value="Mercenaries">Mercenaries</option>
    <option value="Standard">Standard</option>
    <option value="Hardcore Mercenaries">Hardcore Mercenaries</option>
  </select>
  <button id="refreshBtn" onclick="loadAll()">&#x21BA; Refresh Prices</button>
</div>
<div class="status" id="status">Click Refresh Prices to load latest data.</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ff3232"></div>S (1000c+)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff8c00"></div>A (100-999c)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ffd700"></div>B (20-99c)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#50c850"></div>C (5-19c)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6496c8"></div>D (2-4c)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00c8dc"></div>Boss-only</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b400ff"></div>Crafted/Special</div>
  <div class="legend-item"><div class="legend-dot" style="background:#444"></div>Trash (1c)</div>
</div>
<div id="output"></div>
<div class="footer">
  Data from <a href="https://poe.ninja" target="_blank">poe.ninja</a> &middot;
  Filter config from <a href="https://filterblade.xyz" target="_blank">FilterBlade</a> &middot;
  <a href="https://github.com/sheldon/poe-multibase-cheatsheet" target="_blank">GitHub</a>
</div>
<script>
const SECTIONS=[{id:"top",title:"&#11088;&#11088; HIGH VARIETY &mdash; TOP MULTI-BASES",subtitle:"VERY small chance to be VERY expensive",headerColor:"linear-gradient(135deg,#7c3010,#c85a20)",bases:[{name:"Amethyst Flask",type:"UniqueFlask"},{name:"Antique Gauntlets",type:"UniqueArmour"},{name:"Assassin's Boots",type:"UniqueArmour"},{name:"Foul Staff",type:"UniqueWeapon"},{name:"Heavy Belt",type:"UniqueAccessory"},{name:"Hellion's Paw",type:"UniqueWeapon"},{name:"Imperial Bow",type:"UniqueWeapon"},{name:"Imperial Skean",type:"UniqueWeapon"},{name:"Imperial Staff",type:"UniqueWeapon"},{name:"Leather Belt",type:"UniqueAccessory"},{name:"Magistrate Crown",type:"UniqueArmour"},{name:"Paua Amulet",type:"UniqueAccessory"},{name:"Small Cluster Jewel",type:"UniqueJewel"},{name:"Steel Ring",type:"UniqueAccessory"},{name:"Vaal Claw",type:"UniqueWeapon"},{name:"Waxed Garb",type:"UniqueArmour"}]},{id:"multi",title:"&#11088; HIGH VARIETY &mdash; MULTI-BASES",subtitle:"Small chance to be expensive &mdash; always check!",headerColor:"linear-gradient(135deg,#1a3a6e,#2d5fa8)",bases:[{name:"Crude Bow",type:"UniqueWeapon"},{name:"Crusader Plate",type:"UniqueArmour"},{name:"Ebony Tower Shield",type:"UniqueArmour"},{name:"Fiend Dagger",type:"UniqueWeapon"},{name:"Gold Ring",type:"UniqueAccessory"},{name:"Highborn Staff",type:"UniqueWeapon"},{name:"Hydrascale Gauntlets",type:"UniqueArmour"},{name:"Lapis Amulet",type:"UniqueAccessory"},{name:"Moonstone Ring",type:"UniqueAccessory"},{name:"Onyx Amulet",type:"UniqueAccessory"},{name:"Prophet Crown",type:"UniqueArmour"},{name:"Sage's Robe",type:"UniqueArmour"},{name:"Saint's Hauberk",type:"UniqueArmour"},{name:"Spidersilk Robe",type:"UniqueArmour"},{name:"Spine Bow",type:"UniqueWeapon"},{name:"Stealth Boots",type:"UniqueArmour"},{name:"Studded Belt",type:"UniqueAccessory"},{name:"Turquoise Amulet",type:"UniqueAccessory"},{name:"Vaal Blade",type:"UniqueWeapon"}]}];
const BOSS_ONLY=new Set(["Progenesis","Admiral's Arrogance","The Stampede","The Winds of Fate","Mageblood","Law of the Wilds","Wing of the Wyvern","Woespike","Mask of the Stitched Demon","Zerphi's Heart","The Siege","Breathstealer","Sporeguard","Crown of the Tyrant","Mask of the Tribunal","Ashes of the Stars","Stranglegasp","Yoke of Suffering","Crown of the Inward Eye","Hyperboreus","Screams of the Desiccated","Cyclopean Coil","Farrul's Pounce","Witchhunter's Judgment","Mask of the Spirit Drinker","Sacrificial Heart","The Front Line","Betrayal's Sting","Mark of the Elder","Fenumus' Spinnerets","Bloodseeker","Khatal's Weeping","Choir of the Storm","Aul's Uprising","The Eternal Struggle","Crystallised Omniscience","Solstice Vigil","Presence of Chayula","Haunting Memories","The Broken Elegy","Ynda's Stand","Bear's Girdle"]);
const CRAFTED=new Set(["Khatal's Geyser","Mask of the Stitched Demon","Zerphi's Heart","Ynda's Stand","The Winds of Fate"]);
function tier(p){if(p>=1000)return"t-s";if(p>=100)return"t-a";if(p>=20)return"t-b";if(p>=5)return"t-c";if(p>=2)return"t-d";return"t-x"}
function fmt(p){if(p>=1000)return(p/1000).toFixed(1)+"k";if(p>=10)return Math.round(p)+"c";return p.toFixed(1)+"c"}
function itemTier(n,p){if(CRAFTED.has(n))return"t-special";if(BOSS_ONLY.has(n))return"t-boss";return tier(p)}
async function fetchType(league,type){const target="https://poe.ninja/api/data/itemoverview?league="+encodeURIComponent(league)+"&type="+type;const url="https://corsproxy.io/?url="+encodeURIComponent(target);const r=await fetch(url);if(!r.ok)throw new Error(type+" failed: "+r.status);const d=await r.json();return d.lines||[]}
function renderCheatsheet(allItems){
  const byBase={};
  for(const item of allItems){const b=item.baseType;if(!byBase[b])byBase[b]={};if(!byBase[b][item.name]||item.chaosValue>byBase[b][item.name].chaosValue)byBase[b][item.name]=item}
  for(const b of Object.keys(byBase))byBase[b]=Object.values(byBase[b]).sort((a,b2)=>b2.chaosValue-a.chaosValue);
  let html="";
  for(const section of SECTIONS){
    html+='<div class="section"><div class="section-header" style="background:'+section.headerColor+'"><h2>'+section.title+'</h2><p>'+section.subtitle+'</p></div><div class="bases-grid">';
    for(const base of section.bases){
      const items=byBase[base.name]||[];
      const maxPrice=items.length?items[0].chaosValue:0;
      const maxT=items.length?itemTier(items[0].name,maxPrice):"t-x";
      html+='<div class="base-card"><div class="base-header"><div class="base-name">'+base.name+'</div><div class="base-max '+maxT+'">'+(maxPrice?fmt(maxPrice):"?")+'</div></div><div class="items-list">';
      if(!items.length){html+='<div class="no-data">No data</div>';}
      else{for(const item of items){const t=itemTier(item.name,item.chaosValue);const icon=item.icon||"";html+='<div class="item-row '+t+'">'+(icon?'<img class="item-img" src="'+icon+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'<div style="width:28px;flex-shrink:0"></div>')+'<div class="item-name">'+item.name+'</div><div class="item-price">'+fmt(item.chaosValue)+'</div></div>';}}
      html+="</div></div>";
    }
    html+="</div></div>";
  }
  return html;
}
async function loadAll(){
  const league=document.getElementById("leagueSelect").value;
  const btn=document.getElementById("refreshBtn");
  const status=document.getElementById("status");
  const output=document.getElementById("output");
  btn.disabled=true;
  status.className="status loading";
  status.textContent="Fetching prices from poe.ninja...";
  output.innerHTML="";
  try{
    const types=["UniqueWeapon","UniqueArmour","UniqueAccessory","UniqueFlask","UniqueJewel"];
    const results=await Promise.all(types.map(t=>fetchType(league,t)));
    const allItems=results.flat();
    status.className="status";
    status.textContent="Loaded "+allItems.length+" items for "+league+" · Updated "+new Date().toLocaleTimeString();
    output.innerHTML=renderCheatsheet(allItems);
  }catch(e){status.className="status error";status.textContent="Error: "+e.message;}
  btn.disabled=false;
}
loadAll();
</script>
</body>
</html>
